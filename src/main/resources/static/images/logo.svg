<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon Shape -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grayGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hexagon Path -->
  <path d="M 100 20 L 170 50 L 170 130 L 100 160 L 30 130 L 30 50 Z" 
        fill="url(#blueGradient)" 
        stroke="rgba(255,255,255,0.1)" 
        stroke-width="2"/>
  
  <!-- Bottom Gray Section -->
  <path d="M 100 100 L 170 130 L 100 160 L 30 130 Z" 
        fill="url(#grayGradient)"/>
  
  <!-- Circuit Traces (Blue Section) -->
  <path d="M 60 70 Q 80 60, 100 70" 
        stroke="white" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"/>
  <circle cx="60" cy="70" r="4" fill="white"/>
  <circle cx="100" cy="70" r="4" fill="white"/>
  
  <path d="M 70 85 Q 85 75, 100 85" 
        stroke="white" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"/>
  <circle cx="70" cy="85" r="4" fill="white"/>
  <circle cx="100" cy="85" r="4" fill="white"/>
  
  <path d="M 80 100 Q 90 90, 100 100" 
        stroke="white" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"/>
  <circle cx="80" cy="100" r="4" fill="white"/>
  <circle cx="100" cy="100" r="4" fill="white"/>
  
  <!-- Industrial Windows (Gray Section) -->
  <rect x="50" y="120" width="30" height="20" rx="2" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <rect x="85" y="120" width="30" height="20" rx="2" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <rect x="120" y="120" width="30" height="20" rx="2" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
</svg>
