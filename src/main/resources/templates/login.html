<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login — R.I.G.S.</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="/images/logo.svg" alt="R.I.G.S." class="logo-image">
                <h1 class="logo-title">R.I.G.S.</h1>
                <p class="logo-subtitle">Remote Industrial Governance System</p>
            </div>
            <div class="auth-content">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-description">Sign in to access your dashboard</p>

                <div class="error-message" th:if="${error}" th:text="${error}"></div>
                <div class="alert-success" th:if="${success}" th:text="${success}"></div>

                <form action="/login" method="post" class="auth-form">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="you@company.com"
                            required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-input"
                            placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="auth-button auth-button-primary">
                        <span>Sign In</span>
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                            <path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </form>

                <div class="auth-divider"><span>or continue with</span></div>

                <a href="/oauth2/authorization/google" class="auth-button auth-button-google">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                        <path
                            d="M19.6 10.23C19.6 9.52 19.54 8.84 19.42 8.18H10V12.05H15.38C15.15 13.3 14.45 14.36 13.35 15.07V17.58H16.62C18.51 15.84 19.6 13.27 19.6 10.23Z"
                            fill="#4285F4" />
                        <path
                            d="M10 20C12.7 20 14.96 19.1 16.62 17.58L13.35 15.07C12.35 15.67 11.06 16.02 10 16.02C7.4 16.02 5.19 14.26 4.4 11.9H1.06V14.49C2.71 17.76 6.09 20 10 20Z"
                            fill="#34A853" />
                        <path
                            d="M4.4 11.9C4.2 11.3 4.09 10.66 4.09 10C4.09 9.34 4.2 8.7 4.4 8.1V5.51H1.06C.39 6.86 0 8.39 0 10C0 11.61.39 13.14 1.06 14.49L4.4 11.9Z"
                            fill="#FBBC05" />
                        <path
                            d="M10 3.98C11.15 3.98 12.19 4.36 13.02 5.07L16.69 1.4C14.96.49 12.7 0 10 0C6.09 0 2.71 2.24 1.06 5.51L4.4 8.1C5.19 5.74 7.4 3.98 10 3.98Z"
                            fill="#EA4335" />
                    </svg>
                    <span>Continue with Google</span>
                </a>

                <div class="auth-footer">
                    <p>Don't have an account? <a href="/register" class="auth-link">Create account</a></p>
                    <p style="margin-top:8px;"><a href="/" class="auth-link"
                            style="font-size:0.8rem; color:var(--text-muted);">← Back to Homepage</a></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
